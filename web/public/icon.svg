<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Open book base -->
  <path d="M8 48 L32 42 L56 48 L56 16 L32 10 L8 16 Z" fill="#e8f5e9" stroke="#2e7d52" stroke-width="2" stroke-linejoin="round"/>
  <!-- Book spine -->
  <line x1="32" y1="10" x2="32" y2="42" stroke="#2e7d52" stroke-width="2"/>
  <!-- Book pages left -->
  <path d="M10 17 L30 11.5 L30 41 L10 47 Z" fill="#f1f8f2" stroke="none"/>
  <!-- Book pages right -->
  <path d="M34 11.5 L54 17 L54 47 L34 41 Z" fill="#f1f8f2" stroke="none"/>
  
  <!-- Pie chart on left page -->
  <circle cx="20" cy="28" r="7" fill="#c8e6c9" stroke="#2e7d52" stroke-width="1.2"/>
  <path d="M20 28 L20 21 A7 7 0 0 1 26.06 24.5 Z" fill="#2e7d52"/>
  <path d="M20 28 L26.06 24.5 A7 7 0 0 1 24.5 33.5 Z" fill="#66bb6a"/>
  
  <!-- Bar chart on right page -->
  <rect x="38" y="30" width="4" height="8" rx="0.5" fill="#a5d6a7" stroke="#2e7d52" stroke-width="0.8"/>
  <rect x="43" y="25" width="4" height="13" rx="0.5" fill="#66bb6a" stroke="#2e7d52" stroke-width="0.8"/>
  <rect x="48" y="20" width="4" height="18" rx="0.5" fill="#2e7d52" stroke="#2e7d52" stroke-width="0.8"/>
  
  <!-- Line chart on right page -->
  <polyline points="38,36 41,32 45,34 49,28 52,30" fill="none" stroke="#1b5e20" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Cloud icon -->
  <path d="M46 10 Q46 6 50 6 Q54 6 54 10 Q57 10 57 13 Q57 16 54 16 L47 16 Q44 16 44 13 Q44 10 46 10Z" fill="#c8e6c9" stroke="#2e7d52" stroke-width="1.2"/>
  <!-- WiFi arcs on cloud -->
  <path d="M55 8 Q57 6 59 8" fill="none" stroke="#66bb6a" stroke-width="1" stroke-linecap="round"/>
  <path d="M56 6 Q58.5 3.5 61 6" fill="none" stroke="#66bb6a" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Shadow -->
  <ellipse cx="32" cy="54" rx="20" ry="3" fill="#2e7d52" opacity="0.15"/>
</svg>
